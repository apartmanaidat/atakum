<!DOCTYPE html>
<html lang="tr">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Aidat Listesi</title><link rel="stylesheet" href="../css/style.css"></head>
<body>
<div class="topbar"><div class="topbar-left"><a href="panel.html" class="back-btn">← Geri</a><h1>📄 Aidat Listesi</h1></div><button class="btn-logout" onclick="logout()">Çıkış</button></div>
<div class="container">
  <div class="card">
    <div class="card-title">🔍 Filtrele</div>
    <div class="filter-row">
      <select id="fSakin" class="form-control"><option value="">Tüm Sakinler</option></select>
      <select id="fDurum" class="form-control"><option value="">Tüm Durumlar</option><option value="odendi">Ödendi</option><option value="kismi">Kısmi</option><option value="beklemede">Beklemede</option></select>
    </div>
    <div class="filter-row">
      <input type="month" id="fBas" class="form-control">
      <input type="month" id="fBit" class="form-control">
    </div>
    <button class="btn btn-primary btn-block" onclick="load()">Filtrele</button>
  </div>
  <div id="listDiv"><div class="loading"><div class="spinner"></div></div></div>
</div>

<div class="modal-overlay" id="mo">
  <div class="modal">
    <div class="modal-title"><span>Kaydı Düzenle</span><button class="modal-close" onclick="cm()">✕</button></div>
    <input type="hidden" id="eid">
    <div class="form-group"><label>Tutar (₺)</label><input type="number" id="etutar" class="form-control" step="0.01"></div>
    <div class="form-group"><label>Ödenen (₺)</label><input type="number" id="eodenen" class="form-control" step="0.01"></div>
    <div class="form-group"><label>Durum</label><select id="edurum" class="form-control"><option value="odendi">Ödendi</option><option value="kismi">Kısmi</option><option value="beklemede">Beklemede</option></select></div>
    <div class="form-group"><label>Açıklama</label><input type="text" id="eacik" class="form-control"></div>
    <div class="flex gap-1"><button class="btn btn-success flex-1" onclick="saveEdit()">💾 Kaydet</button><button class="btn btn-secondary flex-1" onclick="cm()">İptal</button></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="../js/db.js"></script>
<script>
requireAdmin();
const userMap={};
DB.find('users').forEach(u=>{userMap[u.id]=u;});
DB.find('users',u=>u.rol==='sakin').sort((a,b)=>a.daire_no-b.daire_no).forEach(u=>{
  const o=document.createElement('option');o.value=u.id;o.textContent=`${u.daire_no} - ${u.ad_soyad}`;
  document.getElementById('fSakin').appendChild(o);
});
function load(){
  let rows=DB.get('aidatlar');
  const sid=document.getElementById('fSakin').value;
  const dur=document.getElementById('fDurum').value;
  const bas=document.getElementById('fBas').value;
  const bit=document.getElementById('fBit').value;
  if(sid)rows=rows.filter(r=>r.user_id==sid);
  if(dur)rows=rows.filter(r=>r.durum==dur);
  if(bas){const[by,bm]=bas.split('-').map(Number);rows=rows.filter(r=>r.yil>by||(r.yil==by&&r.ay>=bm));}
  if(bit){const[ey,em]=bit.split('-').map(Number);rows=rows.filter(r=>r.yil<ey||(r.yil==ey&&r.ay<=em));}
  rows.sort((a,b)=>a.yil!=b.yil?b.yil-a.yil:b.ay-a.ay);
  if(!rows.length){document.getElementById('listDiv').innerHTML='<div class="empty-state"><span class="icon">📄</span><p>Kayıt yok</p></div>';return;}
  let h='<div class="card"><div class="table-wrap"><table><thead><tr><th>Daire</th><th>Ad Soyad</th><th>Dönem</th><th>Tutar</th><th>Ödenen</th><th>Durum</th><th>Açıklama</th><th>İşlem</th></tr></thead><tbody>';
  rows.forEach(r=>{
    const u=userMap[r.user_id]||{};
    const dur=r.durum==='odendi'?'<span class="badge badge-success">✅</span>':r.durum==='kismi'?'<span class="badge badge-warning">⏳</span>':'<span class="badge badge-danger">✗</span>';
    h+=`<tr><td><b style="color:var(--primary)">${u.daire_no||'-'}</b></td><td style="font-size:10px;white-space:nowrap">${u.ad_soyad||'-'}</td>
    <td>${r.yil}/${String(r.ay).padStart(2,'0')}</td><td>₺${(r.tutar||0).toFixed(0)}</td><td>₺${(r.odened||r.odenen||0).toFixed(0)}</td>
    <td>${dur}</td><td style="font-size:10px;max-width:60px">${r.aciklama||''}</td>
    <td><div class="actions"><button class="btn btn-warning btn-icon" onclick="edit(${r.id})">✏️</button><button class="btn btn-danger btn-icon" onclick="del(${r.id})">🗑️</button></div></td></tr>`;
  });
  h+='</tbody></table></div></div>';
  document.getElementById('listDiv').innerHTML=h;
}
function edit(id){
  const r=DB.findOne('aidatlar',x=>x.id==id);
  document.getElementById('eid').value=id;
  document.getElementById('etutar').value=r.tutar;
  document.getElementById('eodenen').value=r.odened||r.odenen||0;
  document.getElementById('edurum').value=r.durum;
  document.getElementById('eacik').value=r.aciklama||'';
  document.getElementById('mo').classList.add('active');
}
function saveEdit(){
  const id=parseInt(document.getElementById('eid').value);
  DB.update('aidatlar',id,{tutar:parseFloat(document.getElementById('etutar').value),odenen:parseFloat(document.getElementById('eodenen').value),durum:document.getElementById('edurum').value,aciklama:document.getElementById('eacik').value});
  showToast('Güncellendi ✅','success');cm();load();
}
function del(id){if(!confirm('Silinsin mi?'))return;DB.delete('aidatlar',id);showToast('Silindi','success');load();}
function cm(){document.getElementById('mo').classList.remove('active');}
load();
</script>
</body></html>
